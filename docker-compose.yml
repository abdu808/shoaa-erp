services:
  invoicing:
    build: .
    container_name: shoaa-invoicing
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=8080
      - DATABASE_URL=file:/data/invoicing.sqlite
      - JWT_SECRET=${JWT_SECRET:?set JWT_SECRET in .env}
      - ADMIN_EMAIL=${ADMIN_EMAIL:-admin@example.com}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-Admin@123456}
      - ADMIN_NAME=${ADMIN_NAME:-المدير العام}
    volumes:
      # the single-file database lives on the host -> backup = copy this file
      - ./data:/data
    ports:
      # pick a free host port; your existing reverse proxy maps a subdomain here
      - "8090:8080"
