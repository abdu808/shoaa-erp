services:
  invoicing:
    build: .
    container_name: shoaa-invoicing
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=8080
      - DATABASE_URL=file:/data/invoicing.sqlite
      # Ships ready with test credentials (zero config). Override in production.
      - JWT_SECRET=${JWT_SECRET:-shoaa-default-secret-change-me-in-coolify-env}
      - ADMIN_EMAIL=${ADMIN_EMAIL:-abdu808@gmail.com}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-123456}
      - ADMIN_NAME=${ADMIN_NAME:-المدير العام}
    volumes:
      # the single-file database lives on the host -> backup = copy this file
      - ./data:/data
    ports:
      # pick a free host port; your existing reverse proxy maps a subdomain here
      - "8090:8080"
